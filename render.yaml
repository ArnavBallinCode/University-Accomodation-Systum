services:
  - type: web
    name: uni-accom-api
    runtime: go
    plan: free
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app
    startCommand: ./app
    healthCheckPath: /health
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_TLS_MODE
        value: preferred
      - key: DB_CA_CERT_PATH
        value: ca.pem
      - key: GIN_MODE
        value: release
      - key: TRUSTED_PROXIES
        value: 127.0.0.1,::1
